<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Zenvy</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">

  <div class="bg-white p-8 rounded-xl shadow-md w-96">
    <h2 class="text-2xl font-bold text-center mb-6">Login</h2>

    <form id="loginForm" class="space-y-4">
      <input type="email" id="email" placeholder="Email"
        class="w-full border p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-black" required>
      <input type="password" id="password" placeholder="Password"
        class="w-full border p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-black" required>

      <p id="error-msg" class="text-red-500 text-sm hidden">Invalid email or password.</p>

      <button type="submit" class="w-full bg-black text-white p-3 rounded-lg hover:bg-gray-800">
        Login
      </button>
    </form>

    <p class="text-center mt-4 text-sm">
      Don't have an account?
      <a href="signup.html" class="text-blue-500">Sign Up</a>
    </p>
  </div>

  <script>
    document.getElementById("loginForm").addEventListener("submit", function(e) {
      e.preventDefault();

      const email    = document.getElementById("email").value.trim().toLowerCase();
      const password = document.getElementById("password").value;
      const errEl    = document.getElementById("error-msg");

      const users = JSON.parse(localStorage.getItem("zenvy-users") || "[]");

      const user = users.find(u => u.email === email && u.password === password);

      if (user) {
        localStorage.setItem("loggedIn", "true");
        localStorage.setItem("zenvy-user", JSON.stringify(user));
        window.location.href = "zenvy.html";
      } else {
        errEl.classList.remove("hidden");
      }
    });
  </script>

</body>
</html>
