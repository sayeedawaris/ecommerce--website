<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signup — Zenvy</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
  <div class="bg-white p-8 rounded-xl shadow-md w-96">
    <h2 class="text-2xl font-bold text-center mb-6">Create Account</h2>

    <form id="signupForm" class="space-y-4">
      <input type="text" id="name" placeholder="Full Name"
        class="w-full border p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-black" required />
      <input type="email" id="email" placeholder="Email"
        class="w-full border p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-black" required />
      <input type="password" id="password" placeholder="Password"
        class="w-full border p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-black" required />

      <p id="error-msg" class="text-red-500 text-sm hidden"></p>

      <button type="submit" class="w-full bg-black text-white p-3 rounded-lg hover:bg-gray-800">
        Sign Up
      </button>
    </form>

    <p class="text-center mt-4 text-sm">
      Already have an account?
      <a href="login.html" class="text-blue-500">Login</a>
    </p>
  </div>

  <script>
    document.getElementById("signupForm").addEventListener("submit", function(e) {
      e.preventDefault();

      const name     = document.getElementById("name").value.trim();
      const email    = document.getElementById("email").value.trim().toLowerCase();
      const password = document.getElementById("password").value;
      const errEl    = document.getElementById("error-msg");
      const users = JSON.parse(localStorage.getItem("zenvy-users") || "[]");

      if (users.find(u => u.email === email)) {
        errEl.textContent = "An account with this email already exists.";
        errEl.classList.remove("hidden");
        return;
      }

  
      users.push({ name, email, password });
      localStorage.setItem("zenvy-users", JSON.stringify(users));

      alert("Signup successful!");
      window.location.href = "login.html";
    });
  </script>
</body>
</html>
